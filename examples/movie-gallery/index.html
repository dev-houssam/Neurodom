<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroDOM — Movie Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #070a0f;
      --surface: #0d1117;
      --surface2: #161b22;
      --border: #21262d;
      --accent: #e63946;
      --accent2: #f4a261;
      --text: #e6edf3;
      --muted: #8b949e;
      --card-radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .nav-logo span { color: var(--accent); }

    .nav-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      color: var(--muted);
    }

    /* ── Hero ── */
    .hero {
      padding: 60px 40px 40px;
      max-width: 800px;
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
      margin-bottom: 16px;
    }

    .hero h1 .accent { color: var(--accent); }

    .hero p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      max-width: 480px;
    }

    /* ── Layout ── */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 0;
      min-height: calc(100vh - 200px);
    }

    /* ── Grid ── */
    .grid-section {
      padding: 32px 40px;
      border-right: 1px solid var(--border);
    }

    .section-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    /* ── Movie Card ── */
    movie-card {
      display: block;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
    }

    .card:hover {
      border-color: var(--accent);
    }

    .card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }

    .card-body {
      padding: 10px 12px;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .card-meta {
      font-size: 10px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-rating {
      color: var(--accent2);
    }

    .card-genre {
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* ── Preview Panel ── */
    .preview-section {
      padding: 32px 24px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    preview-player {
      display: block;
    }

    .preview-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      gap: 12px;
      border: 1px dashed var(--border);
      border-radius: var(--card-radius);
    }

    .preview-empty-icon {
      font-size: 48px;
      opacity: 0.3;
    }

    .preview-card {
      display: none;
    }

    .preview-card.visible {
      display: block;
      animation: slide-in 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(16px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .preview-poster {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: var(--card-radius);
      margin-bottom: 20px;
    }

    .preview-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1.1;
    }

    .preview-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .preview-tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      color: var(--muted);
    }

    .preview-rating-big {
      font-size: 14px;
      color: var(--accent2);
      font-weight: 700;
    }

    .preview-overview {
      font-size: 12px;
      line-height: 1.7;
      color: #a3b1c0;
      margin-bottom: 20px;
    }

    .preview-watch-btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s, transform 0.1s;
    }

    .preview-watch-btn:hover {
      background: #ff4d5a;
      transform: translateY(-1px);
    }

    /* ── Status bar ── */
    .status-bar {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 10px;
      color: var(--muted);
      display: flex;
      gap: 12px;
      align-items: center;
      z-index: 10;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4fffb0;
      box-shadow: 0 0 6px #4fffb0;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Loading skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
  <div id="app">
    <nav>
      <div class="nav-logo">⬡ Neuro<span>DOM</span></div>
      <div class="nav-badge">Agent Runtime v0.1 · Movie Gallery</div>
    </nav>

    <div class="hero">
      <h1>Cinema <span class="accent">Intelligence</span><br/>Gallery</h1>
      <p>A NeuroDOM demo — every component is an agent.<br/>
         Agents communicate via typed data flows, no event listeners.</p>
    </div>

    <div class="main-layout">
      <div class="grid-section">
        <div class="section-label">Films</div>
        <movie-grid></movie-grid>
      </div>

      <div class="preview-section">
        <div class="section-label">Preview</div>
        <preview-player></preview-player>
      </div>
    </div>

    <!-- Hidden agents (no UI) -->
    <movie-fetcher></movie-fetcher>

    <div class="status-bar">
      <span class="status-dot"></span>
      NeuroDOM Runtime Active · Press <kbd>Ctrl+Shift+D</kbd> for DevTools
    </div>
  </div>

  <script type="module" src="/examples/movie-gallery/main.js"></script>
</body>
</html>
